# .github/workflows/ci.yml

name: VeriCopy CI
# いつ実行する？
on:
  push:
  pull_request:
    branches: [ main ]

# 実行する処理
jobs:
  test:
    # 複数のPythonバージョンをテスト
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
      fail-fast: false
    
    steps:
      # ステップ1: コードをチェックアウト
      - name: コードを取得
        uses: actions/checkout@v4
      
      # ステップ2: Pythonをセットアップ
      - name: Python ${{ matrix.python-version }} をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      # ステップ3: 依存関係をインストール
      - name: 依存関係をインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      
      # ステップ4: テストを実行
      - name: テストを実行
        run: |
          pytest test_vericopy.py -v --cov=vericopy --cov-report=xml --cov-report=term
      
      # ステップ5: カバレッジをアップロード
      - name: カバレッジレポートをアップロード
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
      
      # ステップ6: テスト結果の表示
      - name: テスト結果の確認
        if: always()
        run: echo "Tests completed for Python ${{ matrix.python-version }}"